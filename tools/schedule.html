<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      alert("⚠️ 發現 JavaScript 執行錯誤！\n訊息: " + message + "\n檔案: " + source + "\n行號: " + lineno + "\n列號: " + colno + "\nError: " + (error ? error.stack : '無'));
      return false;
    };
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神經放射線班表</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/schedule.css">
  
</head>
<body>


<header>
  <a href="../index.html" class="back-link">← 返回首頁</a>
  <h1>🧠 神經放射線班表</h1>
  <p>台北 & 淡水馬偕放射線科 · 班表整合平台</p>
  <button class="settings-btn" onclick="openSettingsModal()">⚙️ 管理設定</button>
</header>

<main>
  <!-- 編輯狀態浮動列 -->
  <div id="floating-edit-bar" style="display:none; justify-content:center; align-items:center; gap:12px; margin: 10px auto 25px; padding: 12px; background: #fef3c7; border-radius: 8px; border: 1px solid #f59e0b; font-size: 0.9rem; max-width: 600px;">
    <span style="font-weight: 700; color: #b45309;">⚠️ 正在排班編輯模式中...</span>
    <button id="saveEditBtn" onclick="saveAllSchedules()" style="padding: 4px 12px; font-size: 0.78rem; font-weight: 700; border-radius: 4px; border: none; background: #10b981; color: white; cursor: pointer;">💾 儲存修改</button>
    <button id="cancelEditBtn" onclick="cancelEditMode()" style="padding: 4px 12px; font-size: 0.78rem; font-weight: 700; border-radius: 4px; border: 1px solid #cbd5e1; background: white; color: #475569; cursor: pointer;">❌ 取消編輯</button>
  </div>

  <!-- 設定彈出視窗 -->
  <div id="adminSettingsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeSettingsModal()">&times;</span>
      <div class="modal-title">⚙️ 班表管理設定</div>
      
      <!-- 登入驗證區 -->
      <div class="modal-section" id="authSection">
        <div id="modal-logged-out">
          <p style="margin: 0 0 10px 0; color:#64748b; font-size:0.85rem;">登入 Google 帳號後即可開啟線上排班編輯、修改休假日等管理功能。</p>
          <button onclick="loginAdmin()" style="width:100%; padding:10px; font-weight:700; border-radius:6px; border:none; background:var(--primary-color); color:white; cursor:pointer;">🔑 登入 Google 帳號</button>
        </div>
        <div id="modal-logged-in" style="display:none; justify-content:space-between; align-items:center;">
          <div>
            <span style="font-size:0.75rem; color:#94a3b8; display:block;">已登入管理者：</span>
            <span id="modal-admin-name" style="font-weight:700; color:var(--primary-color);"></span>
          </div>
          <button onclick="logoutAdmin()" style="padding:6px 12px; font-size:0.78rem; font-weight:600; border-radius:4px; border:1px solid #ef4444; background:none; color:#ef4444; cursor:pointer;">登出</button>
        </div>
      </div>

      <!-- 功能管理區 (僅登入後顯示) -->
      <div id="adminFunctions" style="display:none;">
        <!-- 1. 開啟編輯模式 -->
        <div class="modal-section">
          <label class="modal-label">🔧 排班編輯狀態</label>
          <button id="modalToggleEditBtn" onclick="toggleEditModeFromModal()" style="width:100%; padding:10px; font-weight:700; border-radius:6px; border:none; background:var(--accent-color); color:white; cursor:pointer;">🔧 開啟排班編輯模式</button>
          <p style="margin:6px 0 0 0; font-size:0.72rem; color:#94a3b8;">開啟後，網頁的欄位會切換為選單/輸入框，並於主頁上方出現儲存工具列。</p>
        </div>

        <!-- 2. 醫院休假日設定 -->
        <div class="modal-section">
          <label class="modal-label">📅 醫院休假日設定</label>
          <div style="font-size:0.75rem; color:#64748b; margin-bottom:8px;">請輸入本月放假日期，以半形逗號分隔（如: 7/1, 7/2）：</div>
          <input type="text" id="modalHolidayInput" placeholder="例如: 7/1, 7/2" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; margin-bottom:8px;">
          <button onclick="saveHolidaysFromModal()" style="width:100%; padding:8px; font-weight:700; border-radius:6px; border:none; background:var(--primary-color); color:white; cursor:pointer;">💾 儲存休假日設定</button>
        </div>

        <!-- 3. 新增月份 -->
        <div class="modal-section">
          <label class="modal-label">➕ 建立新月份班表</label>
          <div style="font-size:0.75rem; color:#64748b; margin-bottom:8px;">自動在雲端 Firestore 初始化目標月份的班表模板：</div>
          <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="text" id="newMonthInput" placeholder="例如: 2026-08" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; flex:1; font-size:0.88rem; box-sizing:border-box;">
            <button onclick="handleCreateNewMonth()" style="padding:8px 16px; font-weight:700; border-radius:6px; border:none; background:var(--primary-color); color:white; cursor:pointer;">建立</button>
          </div>
          <label style="font-size:0.75rem; color:#475569; display:flex; align-items:center; gap:6px; cursor:pointer;">
            <input type="checkbox" id="copyPrevMonthCheckbox" checked style="cursor:pointer;"> 帶入前一個月份的工作分配（備註除外）
          </label>
        </div>

        <!-- 4. 排班範本管理 -->
        <div class="modal-section" style="border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 16px;">
          <label class="modal-label">📋 排班範本管理</label>
          <div style="font-size:0.75rem; color:#64748b; margin-bottom:8px;">您可以將當前排班儲存為多個自訂範本，並隨時選取套用至目前月份（保留原有備註）。</div>
          
          <div style="margin-bottom:12px;">
            <label style="font-size:0.75rem; color:#475569; display:block; margin-bottom:4px;">選擇現有範本：</label>
            <select id="templateSelect" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:white; color:#1e293b; cursor:pointer;">
              <option value="">載入範本中...</option>
            </select>
          </div>

          <div style="display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; gap:8px;">
              <button onclick="saveCurrentAsTemplate()" style="flex:1; padding:8px; font-size:0.82rem; font-weight:700; border-radius:6px; border: 1px solid var(--primary-color); background:none; color:var(--primary-color); cursor:pointer;">💾 儲存當前為新範本</button>
              <button onclick="applyTemplateToCurrent()" style="flex:1; padding:8px; font-size:0.82rem; font-weight:700; border-radius:6px; border:none; background:var(--primary-color); color:white; cursor:pointer;">📋 套用所選範本</button>
            </div>
            <button onclick="deleteSelectedTemplate()" style="padding:8px; font-size:0.82rem; font-weight:700; border-radius:6px; border: 1px solid #ef4444; background:none; color:#ef4444; cursor:pointer;">🗑️ 刪除所選範本</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="month-switcher">
    <button class="month-btn" id="prevBtn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" id="nextBtn" onclick="changeMonth(1)">&#8594;</button>
  </div>

  <!-- Today card container -->
  <div id="today-card-container"></div>

  <!-- View Mode Switcher -->
  <div class="view-mode-selector" id="viewModeSelector">
    <button class="mode-btn active" id="mode-today-btn" onclick="setViewMode('today')">📱 今日精簡</button>
    <button class="mode-btn" id="mode-month-btn" onclick="setViewMode('month')">📅 完整月曆</button>
  </div>

  <!-- Tab Switcher -->
  <div class="tabs-container">
    <button class="tab-btn active" id="tab-ni-btn" onclick="switchTab('ni')">📋 日班工作分配</button>
    <button class="tab-btn" id="tab-evt-btn" onclick="switchTab('evt')">🧠 中風取栓班表</button>
  </div>

  <!-- Tab contents -->
  <div id="ni-content" class="tab-panel active">
    <div class="sections-grid" id="ni-sections"></div>
  </div>

  <div id="evt-content" class="tab-panel">
    <div style="display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;">
      <div class="legend" id="legend" style="margin-bottom:0;"></div>
      <div style="display:flex; gap:6px;">
        <button class="filter-btn" onclick="toggleAllFilters(true)">全選</button>
        <button class="filter-btn" onclick="toggleAllFilters(false)">全取消</button>
      </div>
    </div>

    <div class="cal-header-row">
      <div class="cal-dow">週一</div>
      <div class="cal-dow">週二</div>
      <div class="cal-dow">週三</div>
      <div class="cal-dow">週四</div>
      <div class="cal-dow">週五</div>
      <div class="cal-dow weekend">週六</div>
      <div class="cal-dow weekend">週日</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- 儲存格快速設定請假代班 Modal -->
  <div id="cellCoverModal" class="modal">
    <div class="modal-content" style="max-width: 420px; margin: 10% auto;">
      <span class="close" onclick="closeCellCoverModal()">&times;</span>
      <div class="modal-title" id="cellCoverModalTitle">🔄 設定請假代班</div>
      
      <div class="modal-section">
        <label class="modal-label">請假醫師</label>
        <input type="text" id="cellCoverAbsentDoc" readonly style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:#f1f5f9; color:#64748b;">
      </div>
      
      <!-- 單選請假日期 -->
      <div class="modal-section" id="cellCoverDateSelectContainer">
        <label class="modal-label">請假日期</label>
        <select id="cellCoverDateSelect" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:white; color:#1e293b; cursor:pointer;">
        </select>
      </div>

      <!-- 複選請假日期網格 -->
      <div class="modal-section" id="cellCoverDateMultiContainer" style="display:none;">
        <label class="modal-label">請假日期 (可複選)</label>
        <div id="cellCoverDateGrid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
        </div>
      </div>
      
      <!-- 單一代班模式 -->
      <div class="modal-section" id="cellCoverSingleSection">
        <label class="modal-label">代班醫師</label>
        <select id="cellCoverDoctorSelect" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:white; color:#1e293b; cursor:pointer;">
        </select>
      </div>

      <!-- 台北/淡水分開代班模式 -->
      <div class="modal-section" id="cellCoverDoubleSection" style="display:none;">
        <div style="display:flex; gap:10px;">
          <div style="flex:1;">
            <label class="modal-label">台北代班</label>
            <select id="cellCoverDoctorSelectTp" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:white; color:#1e293b; cursor:pointer;">
            </select>
          </div>
          <div style="flex:1;">
            <label class="modal-label">淡水代班</label>
            <select id="cellCoverDoctorSelectDs" style="padding:8px 12px; border-radius:6px; border:1px solid #cbd5e1; width:100%; font-size:0.88rem; box-sizing:border-box; background:white; color:#1e293b; cursor:pointer;">
            </select>
          </div>
        </div>
      </div>
      
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="submitCellCover()" style="flex:1; padding:10px; font-weight:700; border-radius:6px; border:none; background:var(--primary-color); color:white; cursor:pointer;">💾 確定</button>
        <button onclick="closeCellCoverModal()" style="flex:1; padding:10px; font-weight:700; border-radius:6px; border:1px solid #cbd5e1; background:white; color:#475569; cursor:pointer;">❌ 取消</button>
      </div>
    </div>
  </div>
</main>

<!-- Firebase SDK 相容版 UMD 引入 -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script src="../js/schedule.js?v=20260722_1907"></script>

</body>
</html>
