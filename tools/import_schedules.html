    const displayName = document.getElementById('display-name');
    const statusBox = document.getElementById('statusBox');

    // 監聽登入狀態
    onAuthStateChanged(auth, (user) => {
        if (user) {
            userInfo.style.display = 'block';
            displayName.textContent = user.displayName || user.email;
            loginBtn.style.display = 'none';
            importBtn.disabled = false;
        } else {
            userInfo.style.display = 'none';
            loginBtn.style.display = 'inline-block';
            importBtn.disabled = true;
        }
    });

    // 登入事件
    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch((error) => {
            showStatus("登入失敗: " + error.message, "error");
        });
    });

    // 導入事件
    importBtn.addEventListener('click', async () => {
        try {
            importBtn.disabled = true;
            importBtn.textContent = '導入中...';
            
            // 寫入 2026-06
            showStatus("正在導入 2026-06 班表...", "");
            await setDoc(doc(db, "schedules", "2026-06"), {
                ni: NI_DATA['2026-06'],
                evt: ALL_SCHEDULES['2026-06']
            });

            // 寫入 2026-07
            showStatus("正在導入 2026-07 班表...", "");
            await setDoc(doc(db, "schedules", "2026-07"), {
                ni: NI_DATA['2026-07'],
                evt: ALL_SCHEDULES['2026-07']
            });

            showStatus("🎉 所有班表資料成功導入雲端資料庫！", "success");
        } catch (error) {
            console.error("導入失敗:", error);
            showStatus("❌ 導入失敗：" + error.message, "error");
        } finally {
            importBtn.disabled = false;
            importBtn.textContent = '🚀 開始導入雲端資料庫';
        }
    });

    function showStatus(msg, type) {
        statusBox.textContent = msg;
        statusBox.className = "status " + type;
    }
</script>
    </template>
</body>
</html>
