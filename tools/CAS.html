<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carotid Artery Stenting Report</title>
    <link rel="stylesheet" href="../css/shared.css">
    <style>
        body { padding: 20px; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .size-label { font-size: 0.85rem; color: #888; margin-left: 4px; }

        .custom-sheath-row  { display: none; margin-top: 8px; }
        .custom-guiding-row { display: none; margin-top: 8px; }
        .spider-options     { display: none; margin-top: 10px; padding: 10px 14px; background: #f8f9ff; border: 1px solid #c5cae9; border-radius: 6px; }
        .manual-pad-row     { display: none; margin-top: 8px; }
    </style>
    <script type="module" src="../js/auth.js"></script>
</head>
<body>
    <template id="page-content">

<div class="container">
    <a href="../index.html" class="back-link">← 返回首頁</a>
    <h1>Carotid Artery Stenting (CAS) Reporting Platform
        <span style="font-size:0.55em; color:#888; font-weight:normal;">(Updated: 2026/07/03)</span>
    </h1>

    <form name="form">

        <!-- ① Access -->
        <div class="section-card">
            <div class="section-title">🩺 Access & Sheath</div>

            <div class="field-row">
                <span class="field-label">Approach:</span>
                <label><input name="Approach" type="radio" value="right" checked> Right femoral</label>
                <label><input name="Approach" type="radio" value="left"> Left femoral</label>
            </div>

            <div class="field-row">
                <span class="field-label">Sheath:</span>
                <label><input name="SheathOpt" type="radio" value="7Fr. 25cm peripheral sheath" checked onchange="onSheathChange(this)"> 7Fr.</label>
                <label><input name="SheathOpt" type="radio" value="8Fr. 25cm peripheral sheath" onchange="onSheathChange(this)"> 8Fr.</label>
                <label><input name="SheathOpt" type="radio" value="__shuttle__" onchange="onSheathChange(this)"> 6Fr. Shuttle</label>
                <label><input name="SheathOpt" type="radio" value="__custom__" onchange="onSheathChange(this)"> Other</label>
            </div>
            <div class="custom-sheath-row" id="customSheathRow">
                <input name="SheathCustom" type="text" class="hl" style="width:300px;" placeholder="e.g. 8Fr. Fortress 45cm">
            </div>

            <div class="field-row" style="margin-top:8px;">
                <span class="field-label">Ultrasound guidance:</span>
                <label><input name="Ultrasound" type="radio" value="" checked> No</label>
                <label><input name="Ultrasound" type="radio" value=" under ultrasound guidance"> Yes</label>
            </div>
        </div>

        <!-- ② Target Stenosis -->
        <div class="section-card">
            <div class="section-title">🎯 Target Stenosis</div>

            <div class="field-row">
                <span class="field-label">Side <span style="color: red;">*</span>:</span>
                <label><input name="Side" type="radio" value="right" onchange="updateStatDiagnosis(this.value)"> Right</label>
                <label><input name="Side" type="radio" value="left" onchange="updateStatDiagnosis(this.value)"> Left</label>
            </div>

            <div class="field-row">
                <span class="field-label">Location:</span>
                <div class="device-group">
                    <label><input name="Location" type="radio" value="proximal cervical ICA" checked> Proximal cervical ICA</label>
                    <label><input name="Location" type="radio" value="common carotid artery"> Common carotid artery</label>
                    <label><input name="Location" type="radio" value="subclavian artery"> Subclavian artery</label>
                </div>
            </div>

            <div class="field-row">
                <span class="field-label">Stenosis severity:</span>
                <input name="Stenosis" type="number" min="0" max="100" style="width:80px;" class="hl">
                <span>%</span>
            </div>
        </div>

        <!-- ③ Guiding Catheter -->
        <div class="section-card" id="guidingSection">
            <div class="section-title">🔧 Guiding Catheter</div>
            <div class="device-group">
                <label><input name="GuidingOpt" type="radio" value="7Fr. MACH 1 guide catheter" checked onchange="toggleCustomGuiding(false)"> MACH 1 7Fr.</label>
                <label><input name="GuidingOpt" type="radio" value="Neuron 088 guide catheter" onchange="toggleCustomGuiding(false)"> Neuron 088</label>
                <label><input name="GuidingOpt" type="radio" value="AXS Infinity LS guide catheter" onchange="toggleCustomGuiding(false)"> AXS Infinity LS</label>
                <label><input name="GuidingOpt" type="radio" value="__custom__" onchange="toggleCustomGuiding(true)"> Other</label>
            </div>
            <div class="custom-guiding-row" id="customGuidingRow">
                <input name="GuidingCustom" type="text" class="hl" style="width:280px;">
            </div>

        </div>

        <!-- ④ ACT & Heparin -->
        <div class="section-card">
            <div class="section-title">💉 Anticoagulation</div>
            <div class="grid-3">
                <div>
                    <span class="sub-label">Baseline ACT (sec)</span>
                    <input name="BaseACT" type="number" class="hl" style="width:100px;">
                </div>
                <div>
                    <span class="sub-label">Heparin dose (U)</span>
                    <input name="Heparin" type="text" class="hl" style="width:120px;">
                </div>
                <div>
                    <span class="sub-label">Preprocedure ACT (sec)</span>
                    <input name="PreACT" type="number" class="hl" style="width:100px;">
                </div>
            </div>
        </div>

        <!-- ⑤ Distal Protection Device -->
        <div class="section-card">
            <div class="section-title">🛡️ Distal Protection Device</div>
            <div class="device-group">
                <label><input name="Protection" type="radio" value="__none__" onchange="toggleSpiderOptions(false)"> None</label>
                <label><input name="Protection" type="radio" value="__filterwire__" checked onchange="toggleSpiderOptions(false)"> FilterWire EZ</label>
                <label><input name="Protection" type="radio" value="__spiderfx__" onchange="toggleSpiderOptions(true)"> Spider FX</label>
                <label><input name="Protection" type="radio" value="__moma__" onchange="toggleSpiderOptions(false)"> Mo.Ma Proximal</label>
            </div>
            <!-- Spider FX sub-options -->
            <div class="spider-options" id="spiderOptions">
                <span class="sub-label" style="margin-top:0;">Spider FX Size:</span>
                <label><input name="SpiderSize" type="radio" value="4" checked> 4mm</label>
                <label><input name="SpiderSize" type="radio" value="5"> 5mm</label>
                <label><input name="SpiderSize" type="radio" value="6"> 6mm</label>
                <span class="sub-label">Exchange Wire:</span>
                <label><input name="SpiderWire" type="radio" value="SL-10" checked> SL-10</label>
                <label><input name="SpiderWire" type="radio" value="Transcend Floppy"> Transcend Floppy</label>
                <label><input name="SpiderWire" type="radio" value="CHOICE PT Floppy"> CHOICE PT Floppy</label>
                <label><input name="SpiderWire" type="radio" value="Synchro SOFT"> Synchro SOFT 300cm</label>
            </div>
        </div>

        <!-- ⑥ Dilatation & Stenting -->
        <div class="section-card">
            <div class="section-title">🩹 Dilatation & Stenting</div>

            <span class="sub-label">Pre-dilatation</span>
            <div class="field-row">
                <label><input name="PreDilatOpt" type="radio" value="__none__" checked onchange="toggleDilatSize('pre', false)"> Not performed</label>
                <label><input name="PreDilatOpt" type="radio" value="__custom__" onchange="toggleDilatSize('pre', true)"> Balloon size:</label>
                <select name="PreDilatSize" class="hl" id="preDilatSize" style="width:130px; display:none;">
                    <option value="4.0 x 20mm">4.0 x 20mm</option>
                    <option value="4.0 x 40mm">4.0 x 40mm</option>
                    <option value="4.5 x 20mm">4.5 x 20mm</option>
                    <option value="5.0 x 20mm">5.0 x 20mm</option>
                    <option value="5.5 x 20mm">5.5 x 20mm</option>
                    <option value="6.0 x 20mm">6.0 x 20mm</option>
                    <option value="7.0 x 20mm">7.0 x 20mm</option>
                </select>
            </div>

            <hr class="dashed">

            <span class="sub-label">Stent</span>
            <div class="device-group">
                <label><input name="StentType" type="radio" value="Closed-cell carotid Wallstent" checked onchange="onStentTypeChange('Wallstent')"> Wallstent (Closed-cell)</label>
                <label><input name="StentType" type="radio" value="Closed-cell tapered XACT carotid stent system" onchange="onStentTypeChange('XACT')"> XACT (tapered, Closed-cell)</label>
                <label><input name="StentType" type="radio" value="Open-cell Protege carotid stent" onchange="onStentTypeChange('Protege')"> Protege (Open-cell)</label>
            </div>
            <div class="field-row" style="margin-top:10px;">
                <span class="field-label">Size:</span>
                <select name="StentSize" id="stentSizeSelect" class="hl" style="width:130px;"></select>
                <span style="margin-left:15px; font-weight:600;">LOT #:</span>
                <input name="LOT" type="text" class="hl" style="width:140px;">
            </div>

            <hr class="dashed">

            <span class="sub-label">Post-dilatation</span>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div>
                    <label><input name="PostDilatOpt" type="radio" value="__none__" checked onchange="toggleDilatSize('post', false)"> Not performed</label>
                    <label><input name="PostDilatOpt" type="radio" value="__custom__" onchange="toggleDilatSize('post', true)"> Balloon size:</label>
                    <select name="PostDilatSize" class="hl" id="postDilatSize" style="width:130px; display:none;">
                        <option value="4.0 x 20mm">4.0 x 20mm</option>
                        <option value="4.0 x 40mm">4.0 x 40mm</option>
                        <option value="4.5 x 20mm">4.5 x 20mm</option>
                        <option value="5.0 x 20mm">5.0 x 20mm</option>
                        <option value="5.5 x 20mm">5.5 x 20mm</option>
                        <option value="6.0 x 20mm">6.0 x 20mm</option>
                        <option value="7.0 x 20mm">7.0 x 20mm</option>
                    </select>
                </div>
                <div>
                    <label><input name="PostDilatOpt" type="radio" value="__bilateral__" onchange="toggleDilatSize('post', false)">
                        Not performed — bilateral carotid stenosis (hyperperfusion risk)
                    </label>
                </div>
                <div>
                    <label><input name="PostDilatOpt" type="radio" value="__stroke__" onchange="toggleDilatSize('post', false)">
                        Not performed — recent stroke + tight stenosis (reperfusion injury risk)
                    </label>
                </div>
            </div>
        </div>

        <!-- ⑦ Complications -->
        <div class="section-card">
            <div class="section-title">⚠️ Complications during procedure</div>

            <div class="field-row">
                <span class="field-label">Event:</span>
                <label><input name="Event" type="radio" value="__none__" checked> None</label>
                <label><input name="Event" type="radio" value="Bradycardia"> Bradycardia</label>
                <label><input name="Event" type="radio" value="Asystole"> Asystole</label>
            </div>

            <div class="field-row" style="margin-top:6px;">
                <span class="field-label">Interventions:</span>
                <label><input name="Intervention" type="checkbox" value="Encourage cough"> Encourage cough</label>
                <label><input name="Intervention" type="checkbox" value="Chest tapping"> Chest tapping</label>
                <label><input name="Intervention" type="checkbox" value="Atropine 1mg IV push"> Atropine 1mg IV push</label>
            </div>

            <div class="field-row" style="margin-top:10px;">
                <span class="field-label">Residual stenosis:</span>
                <input name="Residual" type="number" min="0" max="100" class="hl" style="width:80px;" value="30">
                <span>%</span>
            </div>
        </div>

        <!-- ⑧ Post Procedure -->
        <div class="section-card">
            <div class="section-title">📋 Post Procedure</div>

            <span class="sub-label">Closure Device</span>
            <div class="device-group">
                <label><input name="Closure" type="radio" value="__angioseal__" checked onchange="toggleManualPad(false)"> Angio-Seal</label>
                <label><input name="Closure" type="radio" value="__starclose__" onchange="toggleManualPad(false)"> Starclose</label>
                <label><input name="Closure" type="radio" value="__obtura__" onchange="toggleManualPad(false)"> Obtura</label>
                <label><input name="Closure" type="radio" value="__manual__" onchange="toggleManualPad(true)"> Manual compression</label>
            </div>
            <div class="manual-pad-row" id="manualPadRow">
                <label><input name="ManualPad" type="radio" value="__none__" checked> Manual compression only</label>
                <label><input name="ManualPad" type="radio" value="__pad__"> + Hemostatic pad</label>
            </div>

            <span class="sub-label" style="margin-top:15px;">Postoperative ACT <span style="font-size:0.8rem; color:#888; font-weight:normal;">(if measured)</span></span>
            <div class="field-row">
                <label><input name="PostACTDone" type="checkbox" id="postACTDone" onchange="togglePostACT(this.checked)"> Measured</label>
                <span id="postACTFields" style="display:none; gap:10px; align-items:center; flex-wrap:wrap; display:none;">
                    <span>ACT:</span>
                    <input name="PostACT" type="number" class="hl" style="width:90px;"> sec
                    <label style="margin-left:10px;"><input name="Protamine" type="checkbox" value="1"> → Protamine administered</label>
                </span>
            </div>

            <span class="sub-label" style="margin-top:15px;">Other Notes <span style="font-size:0.8rem; color:#888; font-weight:normal;">(optional)</span></span>
            <textarea name="PostNotes" rows="2" style="width:100%; box-sizing:border-box;" placeholder="Optional..."></textarea>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-primary" onclick="generateReport()">📄 Generate Report</button>
            <button type="button" class="btn-secondary" onclick="window.location.reload()">🗑️ Clear</button>
        </div>

    </form>

    <div style="margin-top: 30px;">
        <button class="btn-success" onclick="copyReport()">📋 Copy Final Report</button>
        <p style="font-weight:bold; margin-bottom:5px;">Final Report:</p>
        <textarea rows="20" id="Final_Report"></textarea>
    </div>

    <!-- 試算表記錄區 (病歷統計專用) -->
    <div class="section-card" style="margin-top: 30px;">
        <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span>📊 試算表記錄區 (病歷統計專用)</span>
            <a href="https://docs.google.com/spreadsheets/d/1Rcs_jDLG066qDghbKy9iz4P-ytRoGv1E0l_w-jXNKyo/edit?gid=0#gid=0" target="_blank" class="btn-secondary" style="font-size: 0.8rem; text-decoration: none; padding: 6px 12px; display: inline-block; background-color: var(--primary-color); color: white; border-radius: 6px; font-weight: bold;">🔗 開啟統計 Google Sheet</a>
        </div>

        <div class="grid-3" style="margin-top: 15px;">
            <div>
                <span class="sub-label">今天日期</span>
                <input type="text" id="stat_date" class="hl" style="width: 100%; box-sizing: border-box;">
            </div>
            <div>
                <span class="sub-label">病歷號</span>
                <input type="text" id="stat_chart_no" class="hl" style="width: 100%; box-sizing: border-box;" placeholder="請輸入病歷號">
            </div>
            <div>
                <span class="sub-label">Operator</span>
                <select id="stat_operator" class="hl" style="width: 100%; box-sizing: border-box;">
                    <option value="姜信帆" selected>姜信帆</option>
                    <option value="黃俊肇">黃俊肇</option>
                    <option value="謝棖智">謝棖智</option>
                    <option value="魏士揚">魏士揚</option>
                </select>
            </div>
        </div>

        <div class="grid-2" style="margin-top: 15px;">
            <div>
                <span class="sub-label">診斷</span>
                <select id="stat_diagnosis" class="hl" style="width: 100%; box-sizing: border-box;">
                    <option value="Right ICA stenosis" selected>Right ICA stenosis</option>
                    <option value="Left ICA stenosis">Left ICA stenosis</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div>
                <span class="sub-label">Procedure note (支架類型)</span>
                <select id="stat_proc_note" class="hl" style="width: 100%; box-sizing: border-box;">
                    <option value="Wallstent" selected>Wallstent</option>
                    <option value="XACT">XACT</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button type="button" class="btn-success" style="background-color: #2e7d32; color: white;" onclick="copyStatRow()">📋 複製統計整列 (直接貼上)</button>
            <span id="stat_copy_status" style="font-weight: bold; margin-left: 10px;"></span>
        </div>
    </div>
</div>

<script>
    // --- Toggle helpers ---
    function onSheathChange(radio) {
        const isShuttle = radio.value === '__shuttle__';
        const isCustom  = radio.value === '__custom__';
        document.getElementById('customSheathRow').style.display  = isCustom  ? 'block' : 'none';
        // Hide guiding catheter section when Shuttle is used
        document.getElementById('guidingSection').style.display   = isShuttle ? 'none'  : 'block';
    }

    function toggleCustomGuiding(show) {
        document.getElementById('customGuidingRow').style.display = show ? 'block' : 'none';
    }

    function toggleDilatSize(which, show) {
        document.getElementById(which + 'DilatSize').style.display = show ? 'inline-block' : 'none';
    }

    function toggleSpiderOptions(show) {
        document.getElementById('spiderOptions').style.display = show ? 'block' : 'none';
    }

    function toggleManualPad(show) {
        document.getElementById('manualPadRow').style.display = show ? 'block' : 'none';
    }

    function togglePostACT(show) {
        document.getElementById('postACTFields').style.display = show ? 'flex' : 'none';
    }

    // --- Report generation ---
    function generateReport() {
        const f = document.form;

        // Sheath
        const sheathOpt   = f.SheathOpt.value;
        const isShuttle   = sheathOpt === '__shuttle__';
        const sheath = sheathOpt === '__custom__'
            ? (f.SheathCustom.value.trim() || '[sheath]')
            : isShuttle ? '6Fr. Shuttle long sheath'
            : sheathOpt;

        // Approach & ultrasound
        const approach   = f.Approach.value;
        const ultrasound = f.Ultrasound.value;

        // Target
        const sideChecked = document.querySelector('input[name="Side"]:checked');
        if (!sideChecked) {
            alert('請選擇 Target Stenosis 左右側 (Side is required)!');
            return;
        }
        const side     = sideChecked.value;
        const location = f.Location.value;
        const stenosis = f.Stenosis.value;

        // Guiding (skip if Shuttle)
        const guidingOpt = f.GuidingOpt.value;
        const guiding = guidingOpt === '__custom__'
            ? (f.GuidingCustom.value.trim() || '[guiding catheter]')
            : guidingOpt;

        // ACT & Heparin
        const baseACT = f.BaseACT.value;
        const heparin = f.Heparin.value;
        const preACT  = f.PreACT.value;

        // Protection sentence
        const protOpt = f.Protection.value;
        let protectionLine = '';
        if (protOpt === '__filterwire__') {
            protectionLine = '- FilterWire EZ Embolic Protection System was inserted into distal ICA.';
        } else if (protOpt === '__spiderfx__') {
            const sz   = f.SpiderSize.value;
            const wire = f.SpiderWire.value;
            protectionLine = `- SpiderFX embolic Protection Device ${sz}mm was inserted into distal ICA by using exchange wire technique(${wire} 300cm).`;
        } else if (protOpt === '__moma__') {
            protectionLine = '- Mo.Ma ultra Proximal cerebral protection device was used.';
        }

        // Pre-dilatation
        const preDilatOpt = f.PreDilatOpt.value;
        const preDilat = preDilatOpt === '__none__'
            ? 'Not performed'
            : ('A ' + (f.PreDilatSize.value.trim() || '?') + ' balloon');

        // Stent
        const stentType = f.StentType.value;
        const stentSize = f.StentSize.value.trim();
        const lot       = f.LOT.value.trim();
        const stentDesc = `${stentSize} ${stentType}`;

        // Post-dilatation
        const postDilatOpt = f.PostDilatOpt.value;
        let postDilat = '';
        let postDilatExtra = '';
        if (postDilatOpt === '__custom__') {
            postDilat = 'A ' + (f.PostDilatSize.value.trim() || '?') + ' balloon';
        } else if (postDilatOpt === '__bilateral__') {
            postDilat = 'Not performed';
            postDilatExtra = '- Due to bilateral carotid stenosis, full post-dilatation was withheld considering the risk of hyperperfusion syndrome. Follow-up angiography in one to three months is suggested to determine whether post-dilatation would be required.';
        } else if (postDilatOpt === '__stroke__') {
            postDilat = 'Not performed';
            postDilatExtra = '- Due to recent history of stroke and tight stenosis before stenting, post-dilatation was withheld considering the risk of reperfusion injury. Follow-up angiography in one to three months is suggested to determine whether post-dilatation would be required.';
        } else {
            postDilat = 'Not performed';
        }

        // Complications
        const event = f.Event.value;
        let interventions = [];
        f.Intervention.forEach(cb => { if (cb.checked) interventions.push(cb.value); });

        let complicationLine = '';
        if (event !== '__none__') {
            const ivList = interventions.length > 0 ? interventions.join(' / ') : null;
            if (ivList) {
                complicationLine = `- ${event} was noted during PTA and ${ivList} was performed to reverse ${event.toLowerCase()}.`;
            } else {
                complicationLine = `- ${event} was noted during PTA.`;
            }
        }

        const residual = f.Residual.value;

        // Closure
        const closureOpt = f.Closure.value;
        let closureText = '';
        if (closureOpt === '__angioseal__') {
            closureText = 'the vascular closure device (Angio-Seal)';
        } else if (closureOpt === '__starclose__') {
            closureText = 'the vascular closure device (Starclose)';
        } else if (closureOpt === '__obtura__') {
            closureText = 'the vascular closure device (Obtura)';
        } else if (closureOpt === '__manual__') {
            const padOpt = f.ManualPad.value;
            closureText = padOpt === '__pad__'
                ? 'manual compression with hemostatic pad'
                : 'manual compression';
        }

        const postNotes = f.PostNotes.value.trim();

        // --- Assemble ---
        let lines = [];
        lines.push('Percutaneous transluminal angioplasty and stenting for carotid stenosis:');
        lines.push(`- The procedure was performed using ${sheath} via the ${approach} femoral arterial approach${ultrasound}.`);
        lines.push(`- Target stenosis was located at ${side} ${location} with ${stenosis}% stenosis.`);
        if (isShuttle) {
            lines.push('- The Shuttle long sheath was advanced directly to the lesion side distal CCA.');
        } else {
            lines.push(`- A ${guiding} was advanced to the lesion side distal CCA.`);
        }
        lines.push(`- Baseline ACT was ${baseACT} sec.`);
        lines.push(`- Heparin ${heparin}U was given before stenting procedure.`);
        lines.push(`- Preprocedure ACT was ${preACT} sec.`);

        if (protectionLine) lines.push(protectionLine);

        lines.push(`- Pre-dilatation: ${preDilat}.`);
        lines.push(`- Stenting was performed from proximal ICA to distal CCA with a ${stentDesc}.${lot ? ' ( LOT ' + lot + ')' : ''}`);
        lines.push(`- Post-dilatation: ${postDilat}.`);
        if (postDilatExtra) lines.push(postDilatExtra);

        if (complicationLine) lines.push(complicationLine);

        const isPartial = (postDilatOpt === '__bilateral__' || postDilatOpt === '__stroke__');
        const effectWord = isPartial ? 'Partial' : 'Satisfactory';

        lines.push(`- ${effectWord} stenting effect was noted with a ${residual}% residual stenosis.`);
        lines.push('- No immediate complication and new neurologic deficit were noted.');
        lines.push('');

        // Postoperative ACT (before hemostasis)
        const postACTDone = f.PostACTDone.checked;
        if (postACTDone) {
            const postACT = f.PostACT.value;
            const protamine = f.Protamine.checked;
            if (protamine) {
                lines.push(`- Postoperative ACT was ${postACT} sec (>200 sec). Protamine was administered to reverse anticoagulation.`);
            } else {
                lines.push(`- Postoperative ACT was ${postACT} sec.`);
            }
        }

        lines.push(`- Hemostasis was achieved by ${closureText}.`);

        if (postNotes) {
            lines.push('Other notes:');
            lines.push(`- ${postNotes}`);
        }

        lines.push('');

        // IMP
        if (isPartial) {
            // Strip the leading "- " from postDilatExtra for bullet use
            const reasonText = postDilatExtra.replace(/^- /, '');
            lines.push('IMP:');
            lines.push(`1. Successful partial angioplasty and stenting of ${side} internal carotid stenosis with a ${stentDesc}.`);
            lines.push(`2. ${reasonText}`);
        } else {
            lines.push(`IMP: Successful angioplasty and stenting of ${side} internal carotid stenosis with a ${stentDesc}.`);
        }

        document.getElementById('Final_Report').value = lines.join('\n');
    }

    function copyReport() {
        const el = document.getElementById('Final_Report');
        el.select();
        el.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(el.value);
    }

    // --- Google Sheet Statistics Integration ---
    document.addEventListener("DOMContentLoaded", () => {
        // 自動帶入今天日期 (格式 YYYY/MM/DD)
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById("stat_date").value = `${yyyy}/${mm}/${dd}`;

        // 初始化 Stent Size 選項為 Wallstent 的尺寸
        updateStentSizeOptions("Wallstent");
    });

    function updateStatDiagnosis(side) {
        const diagSelect = document.getElementById("stat_diagnosis");
        if (side === "right") {
            diagSelect.value = "Right ICA stenosis";
        } else if (side === "left") {
            diagSelect.value = "Left ICA stenosis";
        }
    }

    function updateStentSizeOptions(stentType) {
        const sizeSelect = document.getElementById("stentSizeSelect");
        sizeSelect.innerHTML = "";

        let options = [];
        let defaultValue = "";

        if (stentType === "Wallstent") {
            options = ["5x30mm", "7x30mm", "7x40mm", "7x50mm", "9x30mm", "9x40mm", "9x50mm"];
            defaultValue = "7x40mm";
        } else if (stentType === "XACT") {
            options = ["8-6x40mm", "9-7x30mm", "9-7x40mm"];
            defaultValue = "8-6x40mm";
        } else if (stentType === "Protege") {
            options = ["7x30mm", "6x30mm", "6x40mm", "8x30mm", "8x40mm"];
            defaultValue = "7x30mm";
        }

        options.forEach(opt => {
            const el = document.createElement("option");
            el.value = opt;
            el.textContent = opt;
            if (opt === defaultValue) {
                el.selected = true;
            }
            sizeSelect.appendChild(el);
        });
    }

    function onStentTypeChange(type) {
        updateStentSizeOptions(type);
        const procSelect = document.getElementById("stat_proc_note");
        if (type === "Wallstent") {
            procSelect.value = "Wallstent";
        } else if (type === "XACT") {
            procSelect.value = "XACT";
        } else {
            procSelect.value = "其他";
        }
    }

    function copyStatRow() {
        const date = document.getElementById("stat_date").value.trim();
        const chartNo = document.getElementById("stat_chart_no").value.trim();
        const operator = document.getElementById("stat_operator").value;
        const diagnosis = document.getElementById("stat_diagnosis").value;
        const procNote = document.getElementById("stat_proc_note").value;

        // 資料欄位順序：今天日期 / 病歷號 / operator / 診斷 / Procedure note
        const rowData = [date, chartNo, operator, diagnosis, procNote];
        const tsvRow = rowData.join('\t');

        navigator.clipboard.writeText(tsvRow);

        const statusSpan = document.getElementById("stat_copy_status");
        if (statusSpan) {
            statusSpan.textContent = "已複製！請開啟統計 Google Sheet，至最底列第一個格子貼上 (Ctrl+V) 即可。";
            statusSpan.style.color = "#2e7d32";
            setTimeout(() => { statusSpan.textContent = ""; }, 4000);
        }
    }
</script>
    </template>
</body>
</html>
